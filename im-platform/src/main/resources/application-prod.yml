notify:
  enable: true # 必须开启，否则 NotifyCheckAspect 会拦截所有离线推送
  uni-push:
    enabled: false # 仅用 APNs，不启用个推
  apns:
    enabled: true
    key-id: ${APNS_KEY_ID:}
    team-id: ${APNS_TEAM_ID:}
    bundle-id: ${APNS_BUNDLE_ID:}
    key-path: ${APNS_KEY_PATH:/opt/apns/AuthKey_DU2B5355Z3.p8}
    production: true

registration:
  require-phone-email-captcha: false
  mode:
    - username # 用户名注册
    - phone # 手机注册,需开启短信功能
    - email # 邮箱注册,需开启短信功能
  ip-limit:
    enabled: false # 是否启用IP注册限制
    max-count: 5 # 每个IP允许注册的最大用户数量（永久限制）