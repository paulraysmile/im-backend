spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/im_platform?useSSL=false&useUnicode=true&characterEncoding=utf-8&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}

minio:
  endpoint: http://127.0.0.1:9001 # 内网地址
  domain: https://www.boxim.online/file # 外网访问地址
  accessKey: ${MINIO_ACCESS_KEY:}
  secretKey: ${MINIO_SECRET_KEY:}
  bucketName: box-im
  imagePath: image
  filePath: file
  videoPath: video
  expireIn: 180 # 文件过期时间,单位:天

webrtc:
  max-channel: 9 # 多人通话最大通道数量，最大不能超过16,建议值:4,9,16
  iceServers:
    - urls: stun:www.boxim.online:3478
      username: ${WEBRTC_STUN_USERNAME:}
      credential: ${WEBRTC_STUN_CREDENTIAL:}
    - urls: turn:www.boxim.online:3478
      username: ${WEBRTC_TURN_USERNAME:}
      credential: ${WEBRTC_TURN_CREDENTIAL:}

sms:
  platform: aliyun # 目前仅支持阿里云短信（aliyun）、亚马逊短信（aws）
  access-key: ${SMS_ACCESS_KEY:}
  secret-key: ${SMS_SECRET_KEY:}
  sign-name: ${SMS_SIGN_NAME:xxx科技} # 阿里云短信签名
  template-id: ${SMS_TEMPLATE_ID:SMS_495985518} # 阿里云短信模板ID
  message: '您好，本次短信验证码为: ${code}，该验证码5分钟内有效，请勿泄露于他人'

mail:
  host: smtp.163.com
  port: 465
  ssl: true
  name: 广州联盒科技
  from: ${MAIL_FROM:}
  pass: ${MAIL_PASS:}
  subject: '您收到一条验证码'
  content: '您好，本次邮箱验证码为: ${code}，该验证码5分钟内有效，请勿泄露于他人'

