# 模式配置
mode: #
  # 运行模式类型，不配置则默认单机模式。可选配置：Standalone、Cluster
  type: Standalone
  # 持久化仓库配置
  repository:
    # 持久化仓库类型，MEMORY表示元数据存储在内存中（也可用JDBC存储）
    type: MEMORY
# 数据源配置，可配置多个 <data-source-name>
dataSources:
  # 数据源名称
  youlai_admin_a:
    # 数据源完整类名
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    # 数据库驱动类名，以数据库连接池自身配置为准
    driverClassName: com.mysql.cj.jdbc.Driver
    # 数据库 URL 连接，以数据库连接池自身配置为准
    jdbcUrl: jdbc:mysql://120.27.136.93:3306/youlai_admin?zeroDateTimeBehavior=convertToNull&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&autoReconnect=true&allowMultiQueries=true&rewriteBatchedStatements=true
    # 数据库用户名，以数据库连接池自身配置为准
    username: root
    # 数据库密码，以数据库连接池自身配置为准
    password: cMDaCMmBjE25bbaG
    # 数据库连接池的其它属性
    minimumIdle: 5
    maximumPoolSize: 20
    maxLifetime: 1800000
    idleTimeout: 60000
    connectionTimeout: 30000
    autoCommit: true
    connectionTestQuery: SELECT 1
    validationTimeout: 5000

rules:
  # 其他非分片表走默认读写分离数据源
  - !SINGLE
    tables:
      - "*.*"                               # 匹配所有其他表
    defaultDataSource: youlai_admin
  - !SHARDING
    defaultDatabaseStrategy:
      standard:
        shardingColumn: id
        shardingAlgorithmName: database_customer
    defaultTableStrategy:
      none:
    keyGenerators:
      snowflake:
        type: SNOWFLAKE
        props:
          worker-id: 1
    tables:
      sys_user:
        actualDataNodes: youlai_admin_a.sys_user  # 物理表名列表
        databaseStrategy:
          standard:
            shardingColumn: id                        # 分表字段
            shardingAlgorithmName: database_customer  # 分片算法
        tableStrategy:
          none:
    shardingAlgorithms:
      # 自定义分片策略
      database_customer:
        type: CLASS_BASED
        props:
          strategy: standard
          algorithmClassName: com.youlai.boot.plugin.algorithm.DatabaseInlineAlgorithm
      database_inline:
        type: INLINE
        props:
          algorithm-expression: ds_${user_id % 2}
      t_order_inline:
        type: INLINE
        props:
          algorithm-expression: t_order_${order_id % 2}
      t_order_item_inline:
        type: INLINE
        props:
          algorithm-expression: t_order_item_${order_id % 2}

props:
  sql-show: true                          # 打印 SQL，便于调试
  check-table: false                      # 不检查表是否存在，防止启动报错
