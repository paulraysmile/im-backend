mode:
  type: Standalone
  repository:
    type: MEMORY
dataSources:
  im_platform:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://8.218.66.42:3306/im_platform?zeroDateTimeBehavior=convertToNull&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&autoReconnect=true&allowMultiQueries=true&rewriteBatchedStatements=true
    username: root
    password: YourStrongPassword123!
    minimumIdle: 5
    maximumPoolSize: 20
    maxLifetime: 1800000
    idleTimeout: 60000
    connectionTimeout: 30000
    autoCommit: true
    connectionTestQuery: SELECT 1
    validationTimeout: 5000
  im_message:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://8.218.66.42:3306/im_message?zeroDateTimeBehavior=convertToNull&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&autoReconnect=true&allowMultiQueries=true&rewriteBatchedStatements=true
    username: root
    password: YourStrongPassword123!
    minimumIdle: 5
    maximumPoolSize: 20
    maxLifetime: 1800000
    idleTimeout: 60000
    connectionTimeout: 30000
    autoCommit: true
    connectionTestQuery: SELECT 1
    validationTimeout: 5000

rules:
  - !SINGLE
    tables:
      - "*.*"
    defaultDataSource: im_platform
  - !SHARDING
    keyGenerators:
      snowflake:
        type: SNOWFLAKE
        props:
          worker-id: 1
    shardingAlgorithms:
      im_private_message_inline:
        type: INLINE
        props:
          algorithm-expression: im_private_message_${company_id}
      im_group_message_inline:
        type: INLINE
        props:
          algorithm-expression: im_group_message_${company_id}
    tables:
      im_private_message:
        actualDataNodes: im_message.im_private_message_${1..20}
        tableStrategy:
          standard:
            shardingColumn: company_id
            shardingAlgorithmName: im_private_message_inline
      im_group_message:
        actualDataNodes: im_message.im_group_message_${1..20}
        tableStrategy:
          standard:
            shardingColumn: company_id
            shardingAlgorithmName: im_group_message_inline

props:
  sql-show: true
  check-table: false
